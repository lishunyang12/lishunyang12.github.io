name: Build & deploy (Stuart)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dart-sass
        run: npm install -g sass

      - name: Compile SCSS
        run: sass styles/index.scss static/style.css --no-source-map --style=compressed

      - name: Download Stuart (prebuilt)
        run: |
          curl -sSL -o stuart https://github.com/w-henderson/Stuart/releases/download/v0.3.1/stuart
          chmod +x stuart

      - name: Build site
        run: ./stuart build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
